<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Chat - Ollama风格界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #0e8c6d;
        }

        .new-chat-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #f3f4f6;
        }

        .chat-item.active {
            background: #e5e7eb;
        }

        .chat-item .title {
            flex: 1;
            font-size: 14px;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .toggle-btn {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            color: #4b5563;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #10a37f;
            color: white;
            border-color: #10a37f;
        }

        .toggle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.user .content {
            background: #10a37f;
            color: white;
        }

        .message.assistant .content {
            background: #f3f4f6;
            color: #1f2937;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-break: break-word;
        }

        .content.loading {
            position: relative;
            min-width: 60px;
        }

        .content.loading::after {
            content: '...';
            position: absolute;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .thinking {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 12px;
            color: #6b7280;
            font-style: italic;
            margin-top: 8px;
            font-size: 13px;
        }

        /* 输入区域 */
        .input-area {
            padding: 24px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #10a37f;
        }

        textarea:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 12px 24px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            height: fit-content;
        }

        .send-btn:hover:not(:disabled) {
            background: #0e8c6d;
        }

        .send-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* 登录模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 24px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4b5563;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #10a37f;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
        }

        .login-btn:hover {
            background: #0e8c6d;
        }

        .tab-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #10a37f;
            color: white;
            border-color: #10a37f;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 错误消息 */
        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn" onclick="createNewChat()">+ 新对话</button>
        </div>
        <div class="chat-list" id="chatList">
            <!-- 聊天列表会动态加载 -->
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="currentChatTitle">选择或创建对话</h2>
            <div class="header-controls">
                <button class="toggle-btn" id="thinkingToggle" onclick="toggleThinking()">💭 思考</button>
                <button class="toggle-btn" id="searchToggle" onclick="toggleSearch()">🌐 搜索</button>
                <button class="toggle-btn" onclick="logout()">🚪 退出</button>
            </div>
        </div>

        <div class="messages" id="messages">
            <!-- 消息会动态显示 -->
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="messageInput" placeholder="输入消息... (Shift + Enter 换行, Enter 发送)" rows="1" disabled></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>发送</button>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>登录 DeepSeek</h2>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">账号登录</button>
                <button class="tab-btn" onclick="switchTab('token')">使用Token</button>
            </div>

            <div id="loginTab" class="tab-pane active">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="输入邮箱">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="mobile" placeholder="输入手机号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="输入密码">
                </div>
                <button class="login-btn" onclick="login()">登录</button>
            </div>

            <div id="tokenTab" class="tab-pane">
                <div class="form-group">
                    <label>Token</label>
                    <input type="text" id="token" placeholder="输入Token">
                </div>
                <button class="login-btn" onclick="loginWithToken()">使用Token</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let parentMessageId = null;
        let thinkingEnabled = false;
        let searchEnabled = false;
        let isLoading = false;
        let currentMessageId = null;
        let eventSource = null;
        let autoRefreshInterval = null;

        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (!data.logged_in) {
                    document.getElementById('loginModal').classList.add('active');
                } else {
                    enableInputs(true);
                    await loadChats();
                    // 设置自动刷新（每30秒刷新一次聊天列表）
                    if (autoRefreshInterval) {
                        clearInterval(autoRefreshInterval);
                    }
                    autoRefreshInterval = setInterval(loadChats, 30000);
                }
            } catch (error) {
                console.error('Failed to check login status:', error);
            }
        }

        // 启用/禁用输入控件
        function enableInputs(enabled) {
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const newChatBtn = document.getElementById('newChatBtn');
            
            messageInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            newChatBtn.disabled = !enabled;
        }

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tokenTab').classList.add('active');
            }
        }

        // 登录
        async function login() {
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;

            if (!password || (!email && !mobile)) {
                alert('请填写邮箱/手机号和密码');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, mobile, password})
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('loginModal').classList.remove('active');
                    enableInputs(true);
                    await loadChats();
                } else {
                    alert('登录失败: ' + data.message);
                }
            } catch (error) {
                alert('登录失败: ' + error);
            }
        }

        // 使用Token登录
        async function loginWithToken() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('请输入Token');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token})
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('loginModal').classList.remove('active');
                    enableInputs(true);
                    await loadChats();
                } else {
                    alert('登录失败: ' + data.message);
                }
            } catch (error) {
                alert('登录失败: ' + error);
            }
        }

        // 退出登录
        async function logout() {
            // 关闭任何现有的EventSource连接
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            // 清除自动刷新
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            
            try {
                await fetch('/api/logout', {method: 'POST'});
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('chatList').innerHTML = '';
                document.getElementById('messages').innerHTML = '';
                enableInputs(false);
                currentChatId = null;
                parentMessageId = null;
            } catch (error) {
                console.error('Logout failed:', error);
            }
        }

        // 加载聊天列表
        async function loadChats() {
            try {
                const response = await fetch('/api/chats');
                const data = await response.json();
                
                console.log('Chats response:', data); // 调试用
                
                if (data.status === 'success') {
                    const chatList = document.getElementById('chatList');
                    chatList.innerHTML = '';
                    
                    // 处理不同的响应格式
                    let chats = [];
                    
                    if (data.chats && Array.isArray(data.chats)) {
                        // 直接是数组格式
                        chats = data.chats;
                    } else if (data.chats && data.chats.data && data.chats.data.biz_data) {
                        // 原有的嵌套格式
                        chats = data.chats.data.biz_data.chat_groups || [];
                    } else if (data.data && data.data.biz_data) {
                        // 另一种可能的格式
                        chats = data.data.biz_data.chat_groups || [];
                    }
                    
                    if (chats.length === 0) {
                        // 显示空状态
                        const emptyDiv = document.createElement('div');
                        emptyDiv.className = 'empty-state';
                        emptyDiv.textContent = '暂无对话，点击"新对话"开始';
                        chatList.appendChild(emptyDiv);
                    } else {
                        chats.forEach(chat => {
                            const chatItem = document.createElement('div');
                            chatItem.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                            chatItem.onclick = (e) => selectChat(chat.id, e);
                            chatItem.innerHTML = `
                                <span class="title">${chat.title || '新对话'}</span>
                            `;
                            chatList.appendChild(chatItem);
                        });
                    }
                }
            } catch (error) {
                console.error('Failed to load chats:', error);
            }
        }

        // 创建新聊天
        async function createNewChat() {
            try {
                const response = await fetch('/api/chats', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                
                console.log('Create chat response:', data); // 调试用
                
                if (data.status === 'success') {
                    currentChatId = data.chat_id || data.data?.chat_id;
                    parentMessageId = null;
                    document.getElementById('messages').innerHTML = '';
                    document.getElementById('currentChatTitle').textContent = '新对话';
                    await loadChats(); // 重新加载聊天列表
                }
            } catch (error) {
                console.error('Failed to create chat:', error);
            }
        }

        // 选择聊天
        async function selectChat(chatId, event) {
            // 关闭任何现有的EventSource连接
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            currentChatId = chatId;
            parentMessageId = null;
            
            // 更新UI
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // 更新标题
            const chatTitle = event.currentTarget.querySelector('.title').textContent;
            document.getElementById('currentChatTitle').textContent = chatTitle;
            
            // 加载聊天历史
            await loadChatHistory(chatId);
        }

        // 加载聊天历史
        async function loadChatHistory(chatId) {
            try {
                const response = await fetch(`/api/chats/${chatId}/history`);
                const data = await response.json();
                
                console.log('History response:', data); // 调试用
                
                if (data.status === 'success') {
                    displayHistory(data);
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        // 显示历史消息
        function displayHistory(data) {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            // 处理不同的响应格式
            let messages = [];
            
            if (data.history && Array.isArray(data.history)) {
                messages = data.history;
            } else if (data.history && data.history.data && data.history.data.biz_data) {
                messages = data.history.data.biz_data.chat_data || [];
            } else if (data.data && data.data.biz_data) {
                messages = data.data.biz_data.chat_data || [];
            }
            
            if (messages.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.textContent = '暂无消息，开始对话吧';
                messagesDiv.appendChild(emptyDiv);
                return;
            }
            
            messages.forEach(msg => {
                if (msg.content) {
                    try {
                        const content = typeof msg.content === 'string' ? 
                            JSON.parse(msg.content) : msg.content;
                        
                        // 根据role判断消息类型
                        if (msg.role === 'USER') {
                            // 用户消息
                            if (content.ask) {
                                addMessage('user', escapeHtml(content.ask));
                            } else if (content.content) {
                                addMessage('user', escapeHtml(content.content));
                            }
                        } else {
                            // 助手消息 (role可能是 'ASSISTANT' 或其他值)
                            if (content.response) {
                                const responseText = extractResponseText(content.response);
                                addMessage('assistant', escapeHtml(responseText));
                            } else if (content.content) {
                                addMessage('assistant', escapeHtml(content.content));
                            }
                        }
                        
                        parentMessageId = msg.id;
                    } catch (e) {
                        console.warn('Failed to parse message content:', e);
                        // 如果解析失败，直接显示内容，并尝试判断角色
                        if (typeof msg.content === 'string') {
                            if (msg.role === 'USER') {
                                addMessage('user', escapeHtml(msg.content));
                            } else {
                                addMessage('assistant', escapeHtml(msg.content));
                            }
                        }
                    }
                }
            });
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 提取响应文本
        function extractResponseText(response) {
            if (typeof response === 'string') {
                return response;
            }
            
            if (response.fragments) {
                return response.fragments
                    .filter(f => f.type === 'RESPONSE' || f.type === 'TEXT')
                    .map(f => f.content || f.text || '')
                    .join('');
            }
            
            if (response.text) {
                return response.text;
            }
            
            return JSON.stringify(response);
        }

        // 切换思考模式
        function toggleThinking() {
            thinkingEnabled = !thinkingEnabled;
            const btn = document.getElementById('thinkingToggle');
            btn.classList.toggle('active', thinkingEnabled);
        }

        // 切换搜索模式
        function toggleSearch() {
            searchEnabled = !searchEnabled;
            const btn = document.getElementById('searchToggle');
            btn.classList.toggle('active', searchEnabled);
        }

        // 发送消息（流式）
        async function sendMessage() {
            if (!currentChatId || isLoading) {
                if (!currentChatId) {
                    alert('请先选择或创建一个对话');
                }
                return;
            }
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // 禁用输入
            isLoading = true;
            enableInputs(false);
            
            // 显示用户消息
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // 创建临时的助手消息（加载状态）
            const tempMessageId = 'temp-' + Date.now();
            addMessage('assistant', '', tempMessageId, true);
            
            // 关闭之前的EventSource连接
            if (eventSource) {
                eventSource.close();
            }
            
            // 构建URL
            const url = `/api/chats/${currentChatId}/messages`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        parent_message_id: parentMessageId,
                        thinking: thinkingEnabled,
                        search: searchEnabled,
                        files: []
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let messageContent = '';
                let thinkingContent = '';
                let currentThinking = false;
                let messageId = null;
                
                // 获取临时消息元素
                const tempMessage = document.getElementById(tempMessageId);
                
                while (true) {
                    const {value, done} = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, {stream: true});
                    
                    // 解析SSE消息
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            const event = line.slice(7);
                            if (event === 'thinking') {
                                currentThinking = true;
                                thinkingContent = '';
                            } else if (event === 'response') {
                                currentThinking = false;
                            }
                        } else if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const jsonData = JSON.parse(data);
                                
                                // 提取消息ID
                                if (jsonData.response_message_id) {
                                    messageId = jsonData.response_message_id;
                                }
                                
                                // 提取内容
                                if (jsonData.v) {
                                    if (typeof jsonData.v === 'string') {
                                        if (currentThinking) {
                                            thinkingContent += jsonData.v;
                                        } else {
                                            messageContent += jsonData.v;
                                        }
                                    } else if (jsonData.v.response) {
                                        const fragments = jsonData.v.response.fragments || [];
                                        for (const fragment of fragments) {
                                            if (fragment.type === 'THINKING') {
                                                thinkingContent += fragment.content || '';
                                            } else if (fragment.type === 'RESPONSE') {
                                                messageContent += fragment.content || '';
                                            }
                                        }
                                    }
                                }
                                
                                // 更新临时消息
                                if (tempMessage) {
                                    let displayContent = '';
                                    if (thinkingContent) {
                                        displayContent += `<div class="thinking">💭 ${thinkingContent}</div>`;
                                    }
                                    displayContent += messageContent;
                                    
                                    const contentDiv = tempMessage.querySelector('.content');
                                    if (contentDiv) {
                                        contentDiv.innerHTML = displayContent.replace(/\n/g, '<br>');
                                        contentDiv.classList.remove('loading');
                                    }
                                }
                            } catch (e) {
                                console.warn('Failed to parse JSON:', data, e);
                            }
                        }
                    }
                }
                
                // 移除临时消息的loading状态
                if (tempMessage) {
                    const contentDiv = tempMessage.querySelector('.content');
                    if (contentDiv) {
                        contentDiv.classList.remove('loading');
                    }
                }
                
                // 更新parentMessageId
                if (messageId) {
                    parentMessageId = messageId;
                }
                
                // 刷新聊天列表（更新标题可能变了）
                await loadChats();
                
            } catch (error) {
                console.error('Stream error:', error);
                
                // 更新临时消息为错误状态
                const tempMessage = document.getElementById(tempMessageId);
                if (tempMessage) {
                    const contentDiv = tempMessage.querySelector('.content');
                    if (contentDiv) {
                        contentDiv.innerHTML = '❌ 发送失败: ' + error.message;
                        contentDiv.classList.remove('loading');
                    }
                }
            } finally {
                isLoading = false;
                enableInputs(true);
                document.getElementById('messageInput').focus();
            }
        }

        // 添加消息到界面
        function addMessage(role, content, messageId = null, isLoading = false) {
            const messagesDiv = document.getElementById('messages');
            
            // 如果有空状态提示，移除它
            const emptyState = messagesDiv.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            if (messageId) {
                messageDiv.id = messageId;
            }
            
            const contentClass = isLoading ? 'content loading' : 'content';
            
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="${contentClass}">${content ? content.replace(/\n/g, '<br>') : ''}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 自动调整文本框高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Enter发送，Shift+Enter换行
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        checkLoginStatus();

        // 清理定时器
        window.addEventListener('beforeunload', function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
</html>
